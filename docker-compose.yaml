services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onramp_stt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onramp_stt"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: onramp
      MINIO_ROOT_PASSWORD: onramp-secret
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 onramp onramp-secret;
      mc mb --ignore-existing local/onramp-stt;
      "

  api:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - path: .env
        required: false
    environment: &app-environment
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/onramp_stt
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: s3
      STORAGE_BUCKET: onramp-stt
      STORAGE_ENDPOINT_URL: http://minio:9000
      STORAGE_REGION: ap-northeast-2
      STORAGE_ACCESS_KEY: onramp
      STORAGE_SECRET_KEY: onramp-secret
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  outbox-publisher:
    build: .
    profiles: ["pipeline"]
    env_file:
      - path: .env
        required: false
    environment: *app-environment
    command: python -m app.workers.outbox_publisher
    depends_on:
      api:
        condition: service_healthy

  orchestrator:
    build: .
    profiles: ["pipeline"]
    env_file:
      - path: .env
        required: false
    environment: *app-environment
    command: python -m app.workers.orchestrator
    depends_on:
      api:
        condition: service_healthy

  clova-worker:
    build: .
    profiles: ["pipeline"]
    env_file:
      - path: .env
        required: true
    environment: *app-environment
    command: python -m app.workers.clova
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
